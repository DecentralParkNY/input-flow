<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAKES — Hand it off.</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.4)}50%{box-shadow:0 0 0 18px rgba(255,107,53,0)}}
  @keyframes taken{0%{transform:scale(1);opacity:1}40%{transform:scale(.92);opacity:.7}100%{transform:translateX(120vw) scale(.7);opacity:0}}
  @keyframes checkIn{from{transform:scale(0) rotate(-90deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
  body{
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    background:#0d0d0f;color:#f0ece4;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    overflow-x:hidden;
  }
  .hero{
    width:100%;max-width:420px;padding:60px 28px 40px;
    display:flex;flex-direction:column;align-items:center;
    animation:fadeUp .7s ease both;
  }
  .logo{
    font-size:13px;letter-spacing:8px;text-transform:uppercase;
    color:#ff6b35;font-weight:700;margin-bottom:48px;
  }
  .logo span{color:#f0ece4;opacity:.3}
  .pitch{
    font-size:38px;font-weight:800;line-height:1.1;
    text-align:center;margin-bottom:12px;
    background:linear-gradient(135deg,#f0ece4 40%,#ff6b35);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .sub{
    font-size:15px;color:#777;text-align:center;
    margin-bottom:52px;line-height:1.5;max-width:300px;
  }
  .card-stack{width:100%;display:flex;flex-direction:column;gap:0;position:relative;min-height:220px}
  .task-card{
    background:#1a1a1f;border:1px solid #2a2a30;border-radius:16px;
    padding:20px 22px;display:flex;align-items:center;gap:16px;
    cursor:grab;user-select:none;transition:all .3s ease;
    position:relative;
  }
  .task-card:not(:first-child){margin-top:-4px}
  .task-card:hover{border-color:#ff6b35;background:#1e1c20}
  .task-card.swiped{animation:taken .5s ease forwards;pointer-events:none}
  .task-card .dot{
    width:10px;height:10px;border-radius:50%;flex-shrink:0;
  }
  .dot.red{background:#ff6b35}.dot.amber{background:#f5a623}.dot.blue{background:#4a9eff}
  .task-card .label{flex:1;font-size:15px;font-weight:500;color:#ccc}
  .task-card .owner{
    font-size:11px;letter-spacing:1px;text-transform:uppercase;
    color:#555;font-weight:600;
  }
  .take-btn{
    background:#ff6b35;color:#0d0d0f;border:none;border-radius:10px;
    font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
    padding:10px 18px;cursor:pointer;transition:all .15s;flex-shrink:0;
  }
  .take-btn:hover{background:#ff8c5a;transform:scale(1.05)}
  .take-btn:active{transform:scale(.95)}
  .done-badge{
    display:none;font-size:22px;animation:checkIn .4s ease both;
  }
  .task-card.swiped .done-badge{display:block}
  .cta-area{
    margin-top:44px;display:flex;flex-direction:column;align-items:center;gap:16px;
    animation:fadeUp .7s .3s ease both;
  }
  .big-btn{
    background:#ff6b35;color:#0d0d0f;border:none;border-radius:14px;
    font-size:16px;font-weight:700;padding:16px 44px;cursor:pointer;
    letter-spacing:1px;text-transform:uppercase;
    animation:pulse 2.5s infinite;transition:transform .15s;
  }
  .big-btn:hover{transform:scale(1.04)}
  .big-btn:active{transform:scale(.96)}
  .footnote{font-size:12px;color:#444;margin-top:4px}
  .counter{
    margin-top:36px;font-size:13px;color:#555;letter-spacing:2px;
    text-transform:uppercase;animation:fadeUp .7s .5s ease both;
  }
  .counter b{color:#ff6b35;font-size:20px;vertical-align:-2px}
</style>
</head>
<body>
<div class="hero">
  <div class="logo">takes <span>///</span></div>
  <h1 class="pitch">Stop carrying it all yourself.</h1>
  <p class="sub">Tap one button. Someone takes it. Every task finds the right hands — instantly.</p>

  <div class="card-stack" id="stack">
    <div class="task-card" data-id="1">
      <div class="dot red"></div>
      <div class="label">Review Q3 deck before noon</div>
      <div class="owner">unowned</div>
      <button class="take-btn" onclick="takeIt(this)">Take</button>
      <div class="done-badge">&#10003;</div>
    </div>
    <div class="task-card" data-id="2">
      <div class="dot amber"></div>
      <div class="label">Book the offsite venue</div>
      <div class="owner">unowned</div>
      <button class="take-btn" onclick="takeIt(this)">Take</button>
      <div class="done-badge">&#10003;</div>
    </div>
    <div class="task-card" data-id="3">
      <div class="dot blue"></div>
      <div class="label">Reply to Kira's vendor email</div>
      <div class="owner">unowned</div>
      <button class="take-btn" onclick="takeIt(this)">Take</button>
      <div class="done-badge">&#10003;</div>
    </div>
  </div>

  <div class="cta-area">
    <button class="big-btn" onclick="dropTask()">+ Drop a task</button>
    <div class="footnote">your team handles the rest</div>
  </div>
  <div class="counter" id="counter"><b id="num">0</b> &nbsp;tasks taken today</div>
</div>

<script>
  let taken=0;
  function takeIt(btn){
    const card=btn.closest('.task-card');
    if(card.classList.contains('swiped'))return;
    taken++;
    document.getElementById('num').textContent=taken;
    card.querySelector('.owner').textContent='you';
    card.querySelector('.owner').style.color='#ff6b35';
    btn.style.display='none';
    card.classList.add('swiped');
  }
  const extras=['Cancel Monday standup','Send onboarding docs','Fix typo on landing page','Order lunch for demo day','Update DNS records'];
  let ei=0;
  function dropTask(){
    const stack=document.getElementById('stack');
    const colors=['red','amber','blue'];
    const card=document.createElement('div');
    card.className='task-card';
    card.style.animation='fadeUp .4s ease both';
    card.innerHTML=`
      <div class="dot ${colors[ei%3]}"></div>
      <div class="label">${extras[ei%extras.length]}</div>
      <div class="owner">unowned</div>
      <button class="take-btn" onclick="takeIt(this)">Take</button>
      <div class="done-badge">&#10003;</div>`;
    stack.appendChild(card);
    ei++;
    stack.scrollTop=stack.scrollHeight;
  }
</script>
</body>
</html>
